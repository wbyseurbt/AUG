amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 1.8
    # 与 Gazebo 激光 max_range 一致；过大时 AMCL 在自由空间会过度随机匹配，导致 map↔odom 抖动
    laser_max_range: 30.0
    laser_min_range: 0.1
    laser_model_type: "likelihood_field"
    max_beams: 120
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    odom_topic: /ugv1/odometry/filtered
    pf_err: 0.03
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.001
    resample_interval: 2
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    # 略提高更新频率，减轻残余定位漂移
    update_min_a: 0.12
    update_min_d: 0.12
    transform_tolerance: 0.2
    z_hit: 0.65
    z_max: 0.05
    z_rand: 0.25
    z_short: 0.05
    scan_topic: /ugv1/scan
    set_initial_pose: true
    # 与当前 Gazebo 出生点 (0,0) 对齐的常用初值；若激光与栅格明显错位，请在 RViz 用「2D Pose Estimate」修正。
    initial_pose:
      x: -35.0
      y: -35.0
      z: 0.0
      yaw: 0.0

